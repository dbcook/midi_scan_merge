; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:Due]
platform = atmelsam
board = due
framework = arduino
monitor_speed = 115200
lib_deps = 
	fortyseveneffects/MIDI Library@^5.0.2
	lathoub/USB-MIDI @ ^1.1.3
	luisllamasbinaburo/ListLib @ ^1.0.0
	apechinsky/MemoryFree@^0.3.0
	arminjo/digitalWriteFast @ ^1.3.1
	sstaub/Ethernet3 @ ^1.6.0
	AppleMIDI=https://github.com/dbcook/Arduino-AppleMIDI-Library#3.3.1.1
	marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
	MemoryFree=https://github.com/mpflaga/Arduino-MemoryFree.git

[env:Grand_Central]
board = adafruit_grandcentral_m4
platform = atmelsam
framework = arduino
monitor_speed = 115200
build_flags = -DARDUINO_ADAFRUIT_GRAND_CENTRAL_M4
lib_deps = 
	fortyseveneffects/MIDI Library@^5.0.2
	lathoub/USB-MIDI @ ^1.1.3
	luisllamasbinaburo/ListLib @ ^1.0.0
	apechinsky/MemoryFree@^0.3.0
	arminjo/digitalWriteFast @ ^1.3.1
	sstaub/Ethernet3 @ ^1.6.0
	AppleMIDI=https://github.com/dbcook/Arduino-AppleMIDI-Library#3.3.1.1
	marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
	MemoryFree=https://github.com/mpflaga/Arduino-MemoryFree.git
